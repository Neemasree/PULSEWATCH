server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html — required for React's client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (content-hashed filenames change on rebuild)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — it must always be fresh so the browser picks
    # up new asset filenames after a deployment
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
